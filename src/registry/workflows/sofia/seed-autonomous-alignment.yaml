id: seed-autonomous-alignment
agent_id: sofia
trigger: "Periodic Autonomous Window (Default: Every 72h or 20 Design-Iterations)"
logic_sequence:
  phase_1_visual_telemetry_harvest:
    step_1: >-
      Collect Design KPIs: Extract 'Accessibility-Conformance-Rate' and 'Token-Compliance-Score' from the frontend-audit
      logs.
    step_2: >-
      Execution Telemetry Scan: Review recent assets generated by Dani (Marketing) to detect 'Visual-Drift' from the
      core 'Brand-Style-Guide.json'.
    step_3: >-
      Initialize 'Aesthetic-Delta': Map the current UI state against the 'Usability-Baseline' to identify
      interaction-friction points.
  phase_2_quality_alignment_check:
    step_4: >-
      Targeted Alignment Check: Verify if active 'Growth-Campaigns' (Dani) are sacrificing 'UX-Clarity' for
      conversion-tracking pixels.
    step_5: >-
      Identify 'Interaction-Friction': Rank components that have a high 'Bounce-Rate' due to poor visual-hierarchy or
      slow 'Interaction-Ready-Time'.
    step_6: >-
      IF 'Brand-Integrity-Score' < 80%: Abort autonomous recalibration and escalate to
      'Human-in-Loop-Creative-Direction'.
  phase_3_autonomous_aesthetic-tuning:
    step_7: >-
      Execute 'Low-Risk-Patches': Apply micro-adjustments to the 'Global-CSS-Variables' (e.g., refining button-contrast
      or typography-scaling) to meet WCAG standards.
    step_8: >-
      Validation Cycle: Run a 'Visual-Regression-Test' to confirm that the changes haven't broken Julia’s structural
      layout or Eva's compliance-tags.
    step_9: >-
      Verify 'Brand-Fidelity': Confirm that all autonomous tweaks still align with the 'Strategic-Vision.md' stored in
      the Vault.
  phase_4_design-transparency_reporting:
    step_10: >-
      Publish 'Design-Pulse': Deliver a compact status report to the Director's Slot-10 with the current
      'Interaction-Quality-Score'.
    step_11: "Log Alignment Event: Record the micro-adjustments in the git-ignored '/local/design/alignment-log.md'."
    step_12: >-
      Post-Audit Monitoring: Track 'Accessibility-Conformance' for the next 24h to ensure the new visual-rules are
      stable.
dependencies:
  required_skills:
    - visual-audit
    - interaction-quality-mapping
    - execution-governance
  required_kpis:
    - accessibility-conformance-rate
  data_inputs:
    - brand-style-guide-json
    - accessibility-policy-json
    - frontend-telemetry
  protocols:
    - visual-arbitration-protocol
    - wcag-compliance-gate
    - low-risk-execution-gate
error_handling:
  on_visual-regression-failure: >-
    If a patch breaks the layout, Sofia auto-reverts to the 'Last-Known-Safe-CSS' and flags the component for a manual
    audit.
  on_accessibility-breach: If conformance drops below 70%, Sofia triggers 'Emergency-Style-Lockdown' until the Director reviews the drift.
expected_output: >
  A validated Autonomous Design Alignment Report containing: 1. Status: [VISUALLY-ALIGNED / STYLE-UPDATED / ESCALATED]
  2. Interaction Quality Score: [0-100%] 3. Action Log: Summary of micro-adjustments (e.g., 'Refined H2 contrast for AA
  compliance'). 4. Next Review Time: Timestamp for the next scheduled aesthetic pulse.
