id: compliance-gate-protocol
title: "Global Compliance & Regulatory Gate"
description: "Stateless governance standard for real-time legal, ethical, and privacy validation of all agent outputs."
tags:
  - global
  - inherited
  - governance

rules:
  - rule_1: "Privacy-By-Design: All data-handling logic must comply with the 'Privacy-Baseline' (e.g., GDPR/CCPA/SOC2) and utilize 'Zero-Knowledge' principles where possible."
  - rule_2: "Truth-in-Growth: Marketing claims generated by Dani must be cross-referenced against the 'Verified-Product-Specs' to prevent deceptive practices."
  - rule_3: "Contractual-Fidelity: Any external API or vendor interaction must adhere to the 'Terms-of-Service-Registry' stored in the Governance Lab."
  - rule_4: "Ethical-Bias-Check: Algorithmic decisions must be audited for 'Unintentional-Bias' before impacting end-user outcomes."
  - rule_5: "Audit-Trail-Mirroring: A compliance-stamped copy of the 'Execution-Hash' must be mirrored to the /governance/legal/ vault for permanent record."

logic_sequence:
  step_1: "Scan Intent-Manifest: Analyze the work-order for 'Sensitive-Action-Flags' (e.g., PII-Access, Financial-Transaction, Public-Messaging)."
  step_2: "Cross-Reference-Rules: Compare the intent against the 'compliance-policy.md' and active 'Regional-Jurisdiction-Rules'."
  step_3: "IF COMPLIANT: Generate a 'Compliance-Auth-Token' and allow the agent to proceed to the 'Audit-Trail-Integrity-Protocol'."
  step_4: "IF NON-COMPLIANT: Intercept and Block. Generate a 'Violation-Brief' detailing the specific rule breached."
  step_5: "Self-Correction-Loop: Suggest a 'Compliant-Alternative' (e.g., 'Anonymize this data before sending to the analytics-node')."

escalation_triggers:
  - "Condition: An agent attempts to bypass the 'Privacy-Vault' to access raw PII (Personally Identifiable Information)."
  - "Condition: A 'Regulatory-Shift' is detected in the external environment that contradicts current 'Strategic-Vision.md'."
  - "Condition: Automatic 'Self-Correction' fails to resolve a high-risk legal ambiguity."

dependencies:
  required_skills:
    - risk-modeling
    - forensic-intent-analysis
  required_kpis:
    - accessibility-conformance-rate
    - brand-fidelity-index
